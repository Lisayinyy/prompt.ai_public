name = "prompt-optimizer-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV 用于频率限制（可选，不绑定也能跑，只是没有频率限制）
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "你的KV_ID"

# API Key 通过 secret 设置，不写在代码里：
# npx wrangler secret put MINIMAX_API_KEY
# npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY  (v20 cron 必需)
# npx wrangler secret put RESEND_API_KEY             (v20 邮件必需)
# npx wrangler secret put CRON_TEST_KEY              (v32-H 手动触发 cron 测试用,可选)
# npx wrangler secret put TEST_EMAIL_KEY             (v33+ /test-email 端点访问令牌,可选)

# v9: Cloudflare Workers AI binding (用于 /embed endpoint 调 bge-m3)
# 免费额度 10k neurons/day，bge-m3 单次 embedding 约 1 neuron
[ai]
binding = "AI"

# v20: Cron Triggers — 每周一 01:00 UTC (北京 09:00) 发 AI Weekly Insights
[triggers]
crons = ["0 1 * * 1"]

# Smart Placement: 让 Worker 在靠近 MiniMax API 的节点运行
[placement]
mode = "smart"

# v34: bind to api.prompt-ai.work — workers.dev is DNS-poisoned in mainland China
# Custom domain auto-creates DNS record + SSL via the Cloudflare-managed prompt-ai.work zone
[[routes]]
pattern = "api.prompt-ai.work"
custom_domain = true
